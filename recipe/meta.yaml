{% set name = "lrslib" %}
{% set version = "73.a" %}
{% set posix = "m2-" if build_platform.startswith("win-") else '' %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: http://cgm.cs.mcgill.ca/~avis/C/lrslib/archive/lrslib-0{{ version.replace(".", "") }}.tar.gz
  sha256: 7fb16ad5c2b7380ef8deaecbfaf53599eef074fd225012aa431b76ee0bded6a6

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}  # [unix]
    - {{ compiler("m2w64_c") }}  # [win]
    - {{ stdlib("c") }}  # [unix]
    - {{ stdlib("m2w64_c") }}  # [win]
    - {{ posix }}coreutils
    - {{ posix }}sed
    - {{ posix }}make
  host:
    - gmp

test:
  requires:
    - curl
  commands:
    - test -f $PREFIX/lib/liblrs${SHLIB_EXT}  # [unix]
    - test -f $PREFIX/include/lrslib/lrslib.h  # [unix]
    - if not exist %LIBRARY_PREFIX%\include\lrslib\lrslib.h exit 1  # [win]
    - curl -L -O http://cgm.cs.mcgill.ca/~avis/C/lrslib/archive/test_files/lrs/bv7.ine  # [build_platform == target_platform]
    - redund bv7.ine  # [build_platform == target_platform]

about:
  home: http://cgm.cs.mcgill.ca/~avis/C/lrs.html
  license: GPL-2.0-or-later
  license_family: GPL
  license_file: COPYING
  summary: lrslib is a self-contained ANSI C implementation of the reverse search algorithm for vertex enumeration/convex hull problems
  doc_url: http://cgm.cs.mcgill.ca/%7Eavis/C/lrslib/USERGUIDE.html

extra:
  recipe-maintainers:
    - isuruf
